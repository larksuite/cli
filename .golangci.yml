version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - asasalint       # checks for pass []any as any in variadic func(...any)
    - asciicheck      # checks that code does not contain non-ASCII identifiers
    - bidichk         # checks for dangerous unicode character sequences
    - bodyclose       # checks whether HTTP response body is closed successfully
    - copyloopvar     # detects places where loop variables are copied
    - durationcheck   # checks for two durations multiplied together
    - exptostd        # detects functions from golang.org/x/exp/ replaceable by std
    - fatcontext      # detects nested contexts in loops
    - gocheckcompilerdirectives # validates go compiler directive comments (//go:)
    - gochecksumtype  # checks exhaustiveness on Go "sum types"
    - gocritic        # diagnostics for bugs, performance and style
    - gomoddirectives # checks for replace, retract, and exclude in go.mod
    - goprintffuncname # checks that printf-like functions end with f
    - govet           # reports suspicious constructs
    - ineffassign     # detects ineffective assignments
    - nilerr          # finds code that returns nil even if error is not nil
    - nolintlint      # reports ill-formed nolint directives
    - nosprintfhostport # checks for misuse of Sprintf to construct host:port
    - reassign        # checks that package variables are not reassigned
    - unconvert       # removes unnecessary type conversions
    - unused          # checks for unused constants, variables, functions and types
    - forbidigo       # forbids specific function calls

    # To enable later after fixing existing issues:
    # - errcheck      # checks for unchecked errors
    # - errname       # checks that error types are named XxxError
    # - errorlint     # checks error wrapping best practices
    # - gosec         # security-oriented linter
    # - misspell      # finds commonly misspelled English words
    # - staticcheck   # comprehensive static analysis

  exclusions:
    paths:
      - generated
    rules:
      - path: _test\.go$
        linters:
          - bodyclose
          - gocritic
          - forbidigo
      - path-except: (shortcuts/|internal/)
        linters:
          - forbidigo
        text: "(vfs|IOStreams|os\\.Exit)"
      - path: internal/vfs/
        linters:
          - forbidigo

  settings:
    forbidigo:
      forbid:
        # ── Filesystem operations: use internal/vfs instead ──
        - pattern: os\.(Stat|Lstat|Open|OpenFile|Create|Mkdir|MkdirAll|Rename|ReadFile|WriteFile|Getwd|UserHomeDir)\b
          msg: "use vfs from internal/vfs instead of os"
        - pattern: os\.(CreateTemp|Remove|RemoveAll)\b
          msg: >-
            internal/: use or extend vfs in internal/vfs first.
            shortcuts/: avoid temp files and destructive fs operations.
        - pattern: os\.(ReadDir|Chdir|Chmod|Chown|Lchown|Link|Symlink|Readlink|Truncate|DirFS|SameFile)\b
          msg: "add the matching API to internal/vfs first, then use vfs"
        # ── IO streams: use IOStreams from cmdutil instead ──
        - pattern: os\.(Stdin|Stdout|Stderr)\b
          msg: "use cmdutil.IOStreams instead of os stdio"
        # ── Process-level rules ──
        - pattern: os\.Exit\b
          msg: >-
            Do not use os.Exit in shortcuts/. Return an error instead and let
            the caller (cmd layer) decide how to terminate.
        # ── Context propagation: always pass ctx from caller ──
        - pattern: context\.(Background|TODO)\b
          msg: >-
            Accept and propagate caller context instead of creating a new one.
      analyze-types: true
    gocritic:
      disabled-checks:
        - appendAssign
        - hugeParam
      disabled-tags:
        - style
    govet:
      enable:
        - httpresponse

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
